version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: electronics-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: electronics_db
    ports:
      - "3306:3306"
    networks:
      - electronics-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    networks:
      - electronics-network

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - electronics-network

  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"
    networks:
      - electronics-network

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - electronics-network
    depends_on:
      - discovery-service

  product-service:
    build: ./product-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/electronics_db?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - electronics-network
    depends_on:
      - mysql
      - kafka
      - discovery-service

  user-service:
    build: ./user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/electronics_db?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - electronics-network
    depends_on:
      - mysql
      - kafka
      - discovery-service

  order-service:
    build: ./order-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/electronics_db?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - electronics-network
    depends_on:
      - mysql
      - kafka
      - discovery-service

networks:
  electronics-network:
    driver: bridge
